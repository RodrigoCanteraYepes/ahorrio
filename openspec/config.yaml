# openspec/config.yaml
# SDD project configuration for control-gastos.
# See: https://github.com/Fission-AI/OpenSpec (convention reference)
# Generated by: sdd-init on 2026-06-04

project: control-gastos
artifact_store: openspec
pace: interactive
review_budget_lines: 400
chain_strategy: ask-always
locale: es-ES

context: |
  Personal finance app (control de gastos).
  PWA built as plain HTML + CSS + vanilla JavaScript.
  No build tooling, no package manager, no frameworks.
  Persistence is local (LocalStorage for v0.x, IndexedDB for larger datasets later).
  Final packaging: APK generated from the PWA via PWABuilder (online, free).
  Spanish (es-ES) UI: dates dd/MM/yyyy, currency EUR (€).

stack:
  type: pwa
  language: html-css-js
  build: none
  package_manager: none
  frameworks: []
  persistence: localStorage
  persistence_fallback: indexeddb
  apk_tool: pwabuilder
  apk_tool_url: https://www.pwabuilder.com/
  offline_first: true

testing:
  strict_tdd: false
  default: manual
  runners_available: []
  future_options:
    - "Jest in the browser via CDN (https://cdn.jsdelivr.net/npm/jest@...)"
    - "Vitest browser mode (when build tooling is introduced later)"

rules:
  proposal:
    - Reference Resumen Ejecutivo.pdf as the input spec source of truth
    - Include a rollback plan when persistence schema changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Locale is es-ES; date format dd/MM/yyyy, currency EUR
  design:
    - Document data model and persistence layout
    - Document offline-first boundaries (no network calls expected in v0.x)
    - Keep the design readable for a non-developer end-user
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one short session
    - No build step required to validate; verify by opening files in a browser
  apply:
    - Follow vanilla JS conventions: no transpilation, no bundler
    - Use modern ES modules and Web Platform APIs (no polyfills beyond widely supported)
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
    manual_checks:
      - "Open index.html in Chrome/Edge and walk through the change scenarios"
      - "Verify offline behavior via DevTools > Application > Service Workers"
  archive:
    - Warn before merging destructive persistence-schema deltas
